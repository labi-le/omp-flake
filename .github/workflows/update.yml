name: Update oh-my-pi

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Get latest release
        id: release
        run: |
          tag=$(curl -sSfL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/can1357/oh-my-pi/releases/latest \
            | jq -r '.tag_name')
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: check
        run: |
          current=$(grep -oP 'version = "\K[^"]+' flake.nix)
          latest="${{ steps.release.outputs.version }}"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [ "$current" = "$latest" ]; then
            echo "Up to date ($current)."
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "$current → $latest"
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version and hashes
        if: steps.check.outputs.needs_update == 'true'
        run: ./scripts/update-version.sh "${{ steps.release.outputs.version }}"

      - name: Validate flake
        if: steps.check.outputs.needs_update == 'true'
        run: nix flake check

      - name: Commit and push to main
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "bump: oh-my-pi ${{ steps.check.outputs.current }} → ${{ steps.release.outputs.version }}"
          git push
